# 化妆品行业AI智能平台 - Docker Compose 编排文件
#
# 注意：RAGFlow 和 Dify 有独立的 docker-compose 文件，不在本文件中：
#   - RAGFlow: ./ragflow/docker-compose.yml
#   - Dify: ./dify/docker-compose.yml
# 如需与本服务联通，请将它们加入 cosmetics-net 外部网络。

version: "3.9"

networks:
  cosmetics-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cosmetics-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - cosmetics-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Redis 7 Alpine
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cosmetics-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - cosmetics-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO（对象存储）
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cosmetics-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - cosmetics-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Backend（FastAPI / Django 等）
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmetics-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - cosmetics-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Frontend（React / Vue 等）
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmetics-frontend
    restart: unless-stopped
    networks:
      - cosmetics-net
    depends_on:
      - backend

  # ─────────────────────────────────────────────
  # Nginx 反向代理
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cosmetics-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cosmetics-net
    depends_on:
      - frontend
      - backend
